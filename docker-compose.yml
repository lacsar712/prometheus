version: '3.8'

# ============================================================
# Base docker-compose.yml - 基础服务定义（生产 / 开发共用）
#
# 本地开发：`docker compose up`
#   自动叠加 docker-compose.override.yml（热重载、源码挂载、debug 端口）
#
# 生产部署：`docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d`
#   叠加资源限制、日志驱动、健康检查等生产加固配置
# ============================================================

services:
  db:
    image: postgres:15-alpine
    container_name: prometheus_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-prometheus_db}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-prometheus_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prometheus_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@db:5432/prometheus_db}
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      TZ: ${TZ:-Asia/Shanghai}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production-please-2024}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production-please-2024}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-beehive-attachments}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      HIVE_ALERT_THRESHOLDS: ${HIVE_ALERT_THRESHOLDS:-}
      HIVE_HIGH_TEMP_THRESHOLD: ${HIVE_HIGH_TEMP_THRESHOLD:-38.0}
      HIVE_LOW_TEMP_THRESHOLD: ${HIVE_LOW_TEMP_THRESHOLD:-10.0}
      HIVE_WEIGHT_LOSS_THRESHOLD: ${HIVE_WEIGHT_LOSS_THRESHOLD:-5.0}
      HIVE_INSPECTION_CYCLE_DAYS: ${HIVE_INSPECTION_CYCLE_DAYS:-7}
      HIVE_SENSOR_OFFLINE_MINUTES: ${HIVE_SENSOR_OFFLINE_MINUTES:-30}
      HIVE_SENSOR_RATE_LIMIT: ${HIVE_SENSOR_RATE_LIMIT:-60}
      HIVE_EMAIL_ALERT_ENABLED: ${HIVE_EMAIL_ALERT_ENABLED:-true}
      HIVE_ALERT_SEVERITY_LEVEL: ${HIVE_ALERT_SEVERITY_LEVEL:-WARNING}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prometheus_frontend
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    container_name: prometheus_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      TZ: ${TZ:-Asia/Shanghai}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_service
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
