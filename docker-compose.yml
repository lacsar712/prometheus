version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: prometheus_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: prometheus_db
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d prometheus_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: prometheus_backend
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/prometheus_db
      ENABLE_METRICS: "true"
      TZ: Asia/Shanghai
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: beehive-attachments
      MINIO_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: always

  frontend:
    build: ./frontend
    container_name: prometheus_frontend
    environment:
      TZ: Asia/Shanghai
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  minio:
    image: minio/minio:latest
    container_name: prometheus_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_service
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

volumes:
  postgres_data:
  minio_data:
